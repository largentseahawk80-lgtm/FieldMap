<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Map Logger</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 400px; width: 100%; margin-bottom: 20px; }
        .log-entry { 
            border-bottom: 1px solid #ccc; 
            padding: 10px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .controls { margin-bottom: 20px; }
        #log { margin-top: 20px; }
        .edit-input { width: 100px; margin: 0 5px; }
        .delete-btn { color: red; cursor: pointer; margin-left: 10px; }
        .edit-btn { color: blue; cursor: pointer; margin-left: 10px; }
        .save-btn { color: green; cursor: pointer; margin-left: 10px; }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f4f4f4;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Field Map Logger</h1>
    <div id="map"></div>
    
    <div class="header-controls">
        <h3>Activity Log</h3>
        <button id="deleteAllBtn" style="background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">Delete All</button>
    </div>
    <div id="log"></div>

    <script>
        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let logs = JSON.parse(localStorage.getItem('fieldLogs') || '[]');
        let markers = [];

        function updateMap() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            if (logs.length > 0) {
                const group = [];
                logs.forEach((entry, index) => {
                    const marker = L.marker([entry.lat, entry.lng])
                        .addTo(map)
                        .bindPopup(`Entry ${index + 1}: ${entry.lat.toFixed(4)}, ${entry.lng.toFixed(4)}`);
                    markers.push(marker);
                    group.push([entry.lat, entry.lng]);
                });
                map.fitBounds(group);
            }
        }

        function renderLog() {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = '';
            logs.forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                
                if (entry.editing) {
                    div.innerHTML = `
                        <div>
                            Lat: <input type="number" step="0.0001" class="edit-input" value="${entry.lat}" id="lat-${index}">
                            Lng: <input type="number" step="0.0001" class="edit-input" value="${entry.lng}" id="lng-${index}">
                        </div>
                        <div>
                            <span class="save-btn" onclick="saveEdit(${index})">Save</span>
                            <span class="delete-btn" onclick="deleteEntry(${index})">Delete</span>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div>
                            <strong>Entry ${index + 1}:</strong> 
                            Lat: ${entry.lat.toFixed(4)}, 
                            Lng: ${entry.lng.toFixed(4)} 
                            <small>(${new Date(entry.timestamp).toLocaleString()})</small>
                        </div>
                        <div>
                            <span class="edit-btn" onclick="toggleEdit(${index})">Edit</span>
                            <span class="delete-btn" onclick="deleteEntry(${index})">Delete</span>
                        </div>
                    `;
                }
                logDiv.appendChild(div);
            });
            localStorage.setItem('fieldLogs', JSON.stringify(logs));
            updateMap();
        }

        function toggleEdit(index) {
            logs[index].editing = true;
            renderLog();
        }

        function saveEdit(index) {
            const newLat = parseFloat(document.getElementById(`lat-${index}`).value);
            const newLng = parseFloat(document.getElementById(`lng-${index}`).value);
            if (!isNaN(newLat) && !isNaN(newLng)) {
                logs[index].lat = newLat;
                logs[index].lng = newLng;
                delete logs[index].editing;
                renderLog();
            }
        }

        function deleteEntry(index) {
            if (confirm('Delete this entry?')) {
                logs.splice(index, 1);
                renderLog();
            }
        }

        document.getElementById('deleteAllBtn').onclick = () => {
            if (confirm('Are you sure you want to delete all log entries?')) {
                logs = [];
                renderLog();
            }
        };

        map.on('click', (e) => {
            logs.push({
                lat: e.latlng.lat,
                lng: e.latlng.lng,
                timestamp: new Date().toISOString()
            });
            renderLog();
        });

        renderLog();
    </script>
</body>
</html>
